<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color:#2c9786;
            --primary-light: #FFEBEE;
            --text-dark: #333333;
            --text-light: #757575;
            --bg-color: #F4F7F6;
            --white: #FFFFFF;
            --input-bg: #F0F2F5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .back-arrow-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--white);
            color: var(--primary-color);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            text-decoration: none;
            box-shadow: 0 8px 18px rgba(0,0,0,0.12);
            border: 1px solid #e6eceb;
            z-index: 2000;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }
        .back-arrow-btn:hover {
            transform: translateY(-1px);
            background-color: #f0faf7;
            box-shadow: 0 10px 22px rgba(0,0,0,0.16);
        }
        .container { display: flex; background: var(--white); width: 1000px; max-width: 100%; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; flex-wrap: wrap; }

        /* Sidebar */
        .sidebar { width: 280px; padding: 40px 20px; border-right: 1px solid #eee; text-align: center; }
        .profile-pic-container { position: relative; width: 100px; height: 100px; margin: 0 auto 15px; }
        .profile-pic { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--white); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        .edit-icon { 
            position: absolute; bottom: 5px; right: 0; 
            background: var(--primary-color); color: var(--white); 
            width: 30px; height: 30px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 14px; cursor: pointer; border: 2px solid var(--white);
            transition: transform 0.2s;
        }
        .edit-icon:hover { transform: scale(1.1); }

        .user-name { font-size: 18px; font-weight: 600; color: var(--text-dark); }
        .user-role { font-size: 14px; color: var(--text-light); margin-bottom: 40px; }
        .nav-menu { list-style: none; text-align: left; }
        .nav-item { padding: 12px 20px; margin-bottom: 10px; cursor: pointer; border-radius: 10px; color: var(--text-light); font-weight: 500; transition: all 0.3s; display: flex; align-items: center; gap: 15px; }
        .nav-item:hover, .nav-item.active { background-color: var(--primary-light); color: var(--primary-color); }

        /* Main Content */
        .main-content { flex: 1; padding: 40px; }
        .section-title { font-size: 22px; font-weight: 600; margin-bottom: 30px; color: var(--text-dark); }
        .form-section { display: none; }
        .form-section.active { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .gender-options { display: flex; gap: 20px; margin-bottom: 25px; }
        .radio-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; color: var(--text-dark); }
        input[type="radio"] { accent-color: var(--primary-color); }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: span 2; }
        label { font-size: 13px; color: var(--text-light); margin-bottom: 8px; }

        /* Updated CSS to include TEXTAREA */
        input, select, textarea { 
            padding: 12px 15px; 
            background: var(--input-bg); 
            border: none; 
            border-radius: 10px; 
            font-size: 14px; 
            color: var(--text-dark); 
            outline: none; 
            transition: 0.2s; 
            width: 100%;
            font-family: 'Poppins', sans-serif;
        }
        
        /* Specific styles for address box */
        textarea {
            resize: vertical; /* Allows resizing only vertically */
            min-height: 80px;
            line-height: 1.5;
        }

        input:focus, select:focus, textarea:focus { box-shadow: 0 0 0 2px var(--primary-light); }
        .readonly-field { background-color: #e9ecef; cursor: not-allowed; color: #666; }

        /* Buttons */
        .btn-container { margin-top: 40px; display: flex; gap: 20px; }
        .btn { flex: 1; padding: 15px; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-size: 14px; transition: 0.3s; }
        .btn-outline { background: transparent; border: 2px solid #ddd; color: var(--text-light); }
        .btn-solid { background: var(--primary-color); color: var(--white); }
        .btn-solid:hover { background: #b71c1c; }

        /* HOVER EFFECT ADDED HERE */
        .btn-outline:hover {
        background-color: #ffebee; /* Light Red Background */
        border-color: #D32F2F;     /* Dark Red Border */
        color: #D32F2F;            /* Dark Red Text */
        }

        @media (max-width: 768px) {
            .back-arrow-btn {
                top: 14px;
                left: 14px;
                width: 38px;
                height: 38px;
                font-size: 16px;
            }
            .container { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid #eee; }
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

<a href="donar_test.html" class="back-arrow-btn" aria-label="Back to dashboard" title="Back">
    <i class="fas fa-arrow-left"></i>
</a>

<div class="container">
    <div class="sidebar">
        <div class="profile-pic-container">
            <img id="display-profile-pic" src="https://i.pravatar.cc/300?img=11" alt="Profile" class="profile-pic">
            <div class="edit-icon" onclick="document.getElementById('file-upload').click()">
                <i class="fas fa-pen"></i>
            </div>
            <input type="file" id="file-upload" style="display: none;" accept="image/*" onchange="uploadImage(event)">
        </div>

        <h2 class="user-name" id="sidebar-name">Roland Donald</h2>
        <p class="user-role">Regular Donor</p>

        <ul class="nav-menu">
            <li class="nav-item active" onclick="switchTab('personal', this)">
                <i class="fas fa-user"></i> Personal Information
            </li>
            <li class="nav-item" onclick="switchTab('security', this)">
                <i class="fas fa-lock"></i> Login & Password
            </li>
            </ul>
    </div>

    <div class="main-content">
        
        <div id="personal-section" class="form-section active">
            <h3 class="section-title">Personal Information</h3>

            <div class="gender-options">
                <label class="radio-label"><input type="radio" name="gender" value="Male" id="gender-male" checked> Male</label>
                <label class="radio-label"><input type="radio" name="gender" value="Female" id="gender-female"> Female</label>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="fname" value="Roland">
                </div>
                <div class="form-group">
                    <label>Middle Name</label>
                    <input type="text" id="mname" value="Roland">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lname" value="Donald">
                </div>

                <div class="form-group">
                    <label style="color: var(--primary-color); font-weight: 600;">Blood Group</label>
                    <select id="blood-group">
                        <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
                        <option selected>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
                    </select>
                </div>

<div class="form-group">
    <label style="color: var(--primary-color); font-weight: 600;">Donation History</label>
    <select id="donation-frequency" onchange="toggleDonationDate()">
        <option value="multiple">Regular Donor (Multiple times)</option>
        <option value="first">First Time Donor</option>
    </select>
</div>

<div class="form-group">
    <label style="color: var(--primary-color); font-weight: 600;">Last Donation Date</label>
    <input type="date" id="donation-date" value="2023-11-15">
</div>

                <div class="form-group full-width">
                    <label>Email</label>
                    <input type="email" id="email" value="rolanddonald@mail.com">
                </div>

                <div class="form-group full-width">
                    <label>Address</label>
                    <textarea id="address" rows="3">3605 Parker Rd. Apt 2B, Sunny Valley, CA, USA</textarea>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="phone" value="(405) 555-0128">
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" value="1995-02-01">
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <select id="location">
                        <option>Atlanta, USA</option>
                        <option>New York, USA</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Postal Code</label>
                    <input type="text" id="zip" value="30301">
                </div>
            </div>

            <div class="btn-container">
                <button class="btn btn-outline" onclick="discardChanges()">Discard Changes</button>
                <button class="btn btn-solid" onclick="saveProfileData()">Save Changes</button>
            </div>
            
            <p id="save-msg" style="color: #27ae60; margin-top: 15px; display: none; font-weight: 500;">
                <i class="fas fa-check-circle"></i> Changes saved successfully!
            </p>
            <p id="discard-msg" style="color: #D32F2F; margin-top: 15px; display: none; font-weight: 500;">
                <i class="fas fa-info-circle"></i> Changes discarded.
            </p>
        </div>

        <div id="security-section" class="form-section">
            <h3 class="section-title">Login & Security</h3>
            
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>Logged in via Email</label>
                    <input type="text" id="login-email" class="readonly-field" readonly>
                </div>
                <div class="form-group full-width">
                    <label>Logged in via Phone</label>
                    <input type="text" id="login-phone" class="readonly-field" readonly>
                </div>
            </div>

            <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">
            
            <h4 style="margin-bottom: 20px; color: var(--text-dark);">Change Password</h4>
            <div class="form-grid">
                <div class="form-group full-width">

                    <input type="password" placeholder="Enter current password">
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" placeholder="Enter new password">

                <button class="btn btn-solid" onclick="triggerPasswordUpdate()">Update Password</button>
            </div>
            <p id="msg-box" style="margin-top:15px; font-size: 13px; color: green; display: none;">
                <i class="fas fa-check-circle"></i> Password changed! New credentials sent to email & SMS.
            </p>
        </div>

    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js';
    import { firebaseConfig } from '../config/firebase-config.js';
    import { getUserProfile, createUserProfile, updateUserProfile } from '../config/supabase-client.js';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const DEMO_AUTH_MODE_KEY = 'authMode';
    const DEMO_AUTH_MODE_VALUE = 'demo';
    const DEMO_SESSION_KEY = 'demoAuthUser';

    let currentAuthUser = null;
    let lastLoadedProfileData = null;

    function setSelectValue(selectId, value, fallbackValue = '') {
        const select = document.getElementById(selectId);
        if (!select) return;

        const targetValue = value || fallbackValue;
        if (!targetValue) return;

        const options = Array.from(select.options || []);
        const hasValue = options.some((opt) => opt.value === targetValue || opt.text === targetValue);
        if (!hasValue) {
            const option = document.createElement('option');
            option.value = targetValue;
            option.textContent = targetValue;
            select.appendChild(option);
        }

        select.value = targetValue;
    }

    function splitName(name) {
        const raw = String(name || '').trim();
        if (!raw) return { fname: '', mname: '', lname: '' };

        const parts = raw.split(/\s+/).filter(Boolean);
        if (parts.length === 1) {
            return { fname: parts[0], mname: '', lname: '' };
        }

        if (parts.length === 2) {
            return { fname: parts[0], mname: '', lname: parts[1] };
        }

        return {
            fname: parts[0],
            mname: parts.slice(1, -1).join(' '),
            lname: parts[parts.length - 1]
        };
    }

    function composeFullName(data) {
        return [data.fname, data.mname, data.lname]
            .filter(Boolean)
            .join(' ')
            .replace(/\s+/g, ' ')
            .trim();
    }

    function getDemoSessionUser() {
        if (localStorage.getItem(DEMO_AUTH_MODE_KEY) !== DEMO_AUTH_MODE_VALUE) {
            return null;
        }

        const raw = localStorage.getItem(DEMO_SESSION_KEY);
        if (!raw) return null;

        try {
            const parsed = JSON.parse(raw);
            if (!parsed || !parsed.uid) return null;
            return {
                uid: parsed.uid,
                email: parsed.email || '',
                displayName: parsed.name || 'Demo Donor',
                isDemo: true
            };
        } catch (error) {
            return null;
        }
    }

    function normalizeProfileRecord(record, fallbackUser) {
        const fullNameFromColumns = [record?.first_name, record?.middle_name, record?.last_name]
            .filter(Boolean)
            .join(' ')
            .trim();

        const fullName = record?.name || fullNameFromColumns || fallbackUser?.displayName || 'Donor';
        const split = splitName(fullName);

        return {
            fname: record?.first_name || split.fname,
            mname: record?.middle_name || split.mname,
            lname: record?.last_name || split.lname,
            bloodGroup: record?.blood_group || 'O+',
            email: record?.email || fallbackUser?.email || '',
            address: record?.address || '',
            phone: record?.phone || record?.phone_number || '',
            dob: record?.date_of_birth || '',
            location: record?.location || 'Atlanta, USA',
            zip: record?.postal_code || record?.zip_code || '',
            gender: record?.gender || 'Male',
            donationFrequency: record?.donation_frequency || 'multiple',
            donationDate: record?.last_donation_date || ''
        };
    }

    function applyProfileData(data) {
        document.getElementById('fname').value = data.fname || '';
        document.getElementById('mname').value = data.mname || '';
        document.getElementById('lname').value = data.lname || '';
        setSelectValue('blood-group', data.bloodGroup, 'O+');
        document.getElementById('email').value = data.email || '';
        document.getElementById('address').value = data.address || '';
        document.getElementById('phone').value = data.phone || '';
        document.getElementById('dob').value = data.dob || '';
        setSelectValue('location', data.location, 'Atlanta, USA');
        document.getElementById('zip').value = data.zip || '';

        if ((data.gender || 'Male').toLowerCase() === 'female') {
            document.getElementById('gender-female').checked = true;
        } else {
            document.getElementById('gender-male').checked = true;
        }

        setSelectValue('donation-frequency', data.donationFrequency || 'multiple', 'multiple');

        const donationDateInput = document.getElementById('donation-date');
        if (data.donationDate) {
            donationDateInput.type = 'date';
            donationDateInput.readOnly = false;
            donationDateInput.style.backgroundColor = 'var(--input-bg)';
            donationDateInput.value = data.donationDate;
        } else {
            donationDateInput.value = '';
        }

        toggleDonationDate();

        const fullName = composeFullName(data) || 'New Donor';
        document.getElementById('sidebar-name').innerText = fullName;
        updateLoginInfo();
    }

    function collectFormData() {
        const donationFrequency = document.getElementById('donation-frequency').value;
        const donationDateRaw = document.getElementById('donation-date').value;
        const donationDate = donationFrequency === 'first' ? null : (donationDateRaw || null);

        return {
            fname: document.getElementById('fname').value.trim(),
            mname: document.getElementById('mname').value.trim(),
            lname: document.getElementById('lname').value.trim(),
            bloodGroup: document.getElementById('blood-group').value,
            email: document.getElementById('email').value.trim(),
            address: document.getElementById('address').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            dob: document.getElementById('dob').value,
            location: document.getElementById('location').value,
            zip: document.getElementById('zip').value.trim(),
            gender: document.getElementById('gender-male').checked ? 'Male' : 'Female',
            donationFrequency,
            donationDate
        };
    }

    function showMessage(elementId, html, timeoutMs = 2000) {
        const element = document.getElementById(elementId);
        if (!element) return;

        element.innerHTML = html;
        element.style.display = 'block';

        if (timeoutMs > 0) {
            setTimeout(() => {
                element.style.display = 'none';
            }, timeoutMs);
        }
    }

    function updateLoginInfo() {
        document.getElementById('login-email').value = document.getElementById('email').value;
        document.getElementById('login-phone').value = document.getElementById('phone').value;
    }

    function persistLocalCache(formData) {
        const fullName = composeFullName(formData) || 'Donor';

        localStorage.setItem('donorData', JSON.stringify(formData));
        localStorage.setItem('donorName', fullName);
        localStorage.setItem('userId', currentAuthUser.uid);
        localStorage.setItem('userEmail', formData.email || currentAuthUser.email || '');
        localStorage.setItem('userData', JSON.stringify({
            uid: currentAuthUser.uid,
            name: fullName,
            phone: formData.phone,
            email: formData.email || currentAuthUser.email || '',
            gender: formData.gender,
            bloodGroup: formData.bloodGroup,
            createdAt: new Date().toISOString()
        }));
    }

    async function ensureProfileExistsFromDb() {
        const existing = await getUserProfile(currentAuthUser.uid);
        if (existing) {
            return existing;
        }

        const fallbackDataRaw = localStorage.getItem('donorData');
        let fallbackData = null;
        try {
            fallbackData = fallbackDataRaw ? JSON.parse(fallbackDataRaw) : null;
        } catch (error) {
            fallbackData = null;
        }

        const fullName = fallbackData
            ? composeFullName(fallbackData)
            : (currentAuthUser.displayName || 'Donor');

        const payload = {
            uid: currentAuthUser.uid,
            name: fullName,
            phone: (fallbackData && fallbackData.phone) || '',
            email: currentAuthUser.email || (fallbackData && fallbackData.email) || '',
            gender: (fallbackData && fallbackData.gender) || 'Male',
            bloodGroup: (fallbackData && fallbackData.bloodGroup) || 'O+',
            createdAt: new Date().toISOString()
        };

        return await createUserProfile(payload);
    }

    async function loadProfileData() {
        const savedImage = localStorage.getItem('donorProfilePic');
        if (savedImage) {
            document.getElementById('display-profile-pic').src = savedImage;
        }

        const dbProfile = await ensureProfileExistsFromDb();
        const normalized = normalizeProfileRecord(dbProfile, currentAuthUser);
        lastLoadedProfileData = { ...normalized };
        applyProfileData(normalized);
    }

    function toggleDonationDate() {
        const frequency = document.getElementById('donation-frequency').value;
        const dateInput = document.getElementById('donation-date');

        if (frequency === 'first') {
            dateInput.type = 'text';
            dateInput.value = 'First Time Donor';
            dateInput.style.backgroundColor = '#e9ecef';
            dateInput.readOnly = true;
        } else {
            const existing = dateInput.value;
            dateInput.type = 'date';
            dateInput.readOnly = false;
            dateInput.style.backgroundColor = 'var(--input-bg)';
            if (existing === 'First Time Donor') {
                dateInput.value = '';
            }
        }
    }

    async function saveProfileData() {
        if (!currentAuthUser || !currentAuthUser.uid) {
            showMessage('discard-msg', '<i class="fas fa-info-circle"></i> Please login first to update profile.', 2400);
            return;
        }

        const formData = collectFormData();
        const fullName = composeFullName(formData) || 'Donor';

        const richUpdates = {
            name: fullName,
            first_name: formData.fname,
            middle_name: formData.mname,
            last_name: formData.lname,
            email: formData.email || currentAuthUser.email || '',
            phone: formData.phone,
            phone_number: formData.phone,
            gender: formData.gender,
            blood_group: formData.bloodGroup,
            date_of_birth: formData.dob || null,
            location: formData.location,
            postal_code: formData.zip,
            address: formData.address,
            donation_frequency: formData.donationFrequency,
            last_donation_date: formData.donationDate
        };

        let updated = await updateUserProfile(currentAuthUser.uid, richUpdates);

        if (!updated) {
            const minimalUpdates = {
                name: fullName,
                email: formData.email || currentAuthUser.email || '',
                phone: formData.phone,
                phone_number: formData.phone,
                gender: formData.gender,
                blood_group: formData.bloodGroup
            };
            updated = await updateUserProfile(currentAuthUser.uid, minimalUpdates);
        }

        if (!updated) {
            showMessage('discard-msg', '<i class="fas fa-info-circle"></i> Failed to save profile to database. Check Supabase schema/policies.', 2800);
            return;
        }

        persistLocalCache(formData);
        lastLoadedProfileData = { ...formData };
        document.getElementById('sidebar-name').innerText = fullName;

        showMessage('save-msg', '<i class="fas fa-check-circle"></i> Changes saved to database successfully!', 1500);
        setTimeout(() => {
            window.location.href = 'donar_test.html';
        }, 1400);
    }

    function discardChanges() {
        if (lastLoadedProfileData) {
            applyProfileData(lastLoadedProfileData);
        }
        showMessage('discard-msg', '<i class="fas fa-info-circle"></i> Changes discarded.', 1800);
    }

    function switchTab(tabName, element) {
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        element.classList.add('active');
        document.querySelectorAll('.form-section').forEach(sec => sec.classList.remove('active'));
        document.getElementById(tabName + '-section').classList.add('active');
    }

    function triggerPasswordUpdate() {
        showMessage('msg-box', '<i class="fas fa-info-circle"></i> Password update can be managed using Firebase Auth reset flow from login page.', 2500);
    }

    function uploadImage(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
            document.getElementById('display-profile-pic').src = e.target.result;
            localStorage.setItem('donorProfilePic', e.target.result);
        };
        reader.readAsDataURL(file);
    }

    window.toggleDonationDate = toggleDonationDate;
    window.saveProfileData = saveProfileData;
    window.discardChanges = discardChanges;
    window.switchTab = switchTab;
    window.triggerPasswordUpdate = triggerPasswordUpdate;
    window.uploadImage = uploadImage;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentAuthUser = user;
            await loadProfileData();
            return;
        }

        const demoUser = getDemoSessionUser();
        if (demoUser) {
            currentAuthUser = demoUser;
            await loadProfileData();
            return;
        }

        window.location.href = 'main_donar_login.html';
    });
